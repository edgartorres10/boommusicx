<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoomMusicX - Sertanejo e Agronejo Moderno</title>
    <meta name="description" content="BoomMusicX - Músicas e playlists exclusivas de sertanejo e agronejo moderno.">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        header {
            background: #000;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #1DB954;
        }

        header h1 {
            color: #1DB954;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero h2 {
            font-size: 40px;
        }

        .btn {
            background: #1DB954;
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
        }

        .music {
            margin-top: 40px;
        }

        iframe {
            width: 100%;
            border-radius: 12px;
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #1DB954;
            margin-top: 40px;
        }

        .social i {
            margin: 10px;
            font-size: 20px;
            color: #1DB954;
        }
    </style>
</head>

<body>

<header>
    <h1>BoomMusicX</h1>
</header>

<section class="hero">
    <h2>Sertanejo & Agronejo Moderno</h2>
    <p>Divulgando minhas músicas e playlists 🎵</p>

    <a href="#" class="btn">
        <i class="fab fa-spotify"></i> Ouvir no Spotify
    </a>
</section>

<div class="container">

    <h3>🔥 Música em destaque</h3>

    <iframe src="https://open.spotify.com/embed/track/4cOdK2wGLETKBW3PvgPWqT"></iframe>

    <div class="music">
        <h3>🎧 Playlist</h3>

        <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX3rxVfibe1L0"></iframe>
    </div>

</div>

<footer>
    <p>© 2026 BoomMusicX</p>

    <div class="social">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
        <a href="#"><i class="fab fa-spotify"></i></a>
    </div>
</footer>

</body>
</html>
