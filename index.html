<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoomMusicX - Feed Musical</title>

<!-- Manifest PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
/* ===== VARIÁVEIS ===== */
:root {
    --bg-primary: #000;
    --bg-secondary: #0a0a0a;
    --text-primary: #fff;
    --text-secondary: #b3b3b3;
    --accent-green: #1DB954;
    --accent-green-hover: #1ed760;
    --card-bg: rgba(0,0,0,0.6);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --border-radius: 16px;
}

/* ===== RESET ===== */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;
       background:var(--bg-primary); color:var(--text-primary); overflow:hidden; height:100vh; }

/* ===== HEADER ===== */
.header {
    position: fixed; top:0; left:0; right:0; z-index:1000;
    background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(0,0,0,0.8));
    backdrop-filter: blur(10px); padding:15px 20px; border-bottom:1px solid rgba(29,185,84,0.3);
}
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon { font-size:28px; animation:float 3s ease-in-out infinite; }
.logo h1 { font-size:1.6rem; font-weight:700;
    background: linear-gradient(45deg,var(--text-primary),var(--accent-green));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* ===== FEED ===== */
.feed { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory;
       -webkit-overflow-scrolling: touch; scroll-behavior:smooth; padding-top:80px; }
.feed::-webkit-scrollbar { display:none; }

/* ===== CARDS ===== */
.music-card {
    height:100vh;
    scroll-snap-align:start;
    display:flex; justify-content:center; align-items:center;
    position:relative;
    z-index:0;
}
.card-content {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: var(--border-radius);
    padding:20px;
    width:90%; max-width:400px;
    border:1px solid rgba(29,185,84,0.2);
    box-shadow: var(--shadow);
    z-index:2; /* garante que fique acima da capa */
    display:flex; flex-direction:column; align-items:center;
}

/* ===== CAPA ===== */
.cover-container {
    width:100%; aspect-ratio:1;
    border-radius:12px; overflow:hidden;
    position:relative; margin-bottom:15px; z-index:1;
}
.cover-image { width:100%; height:100%; object-fit:cover; transition:transform 0.5s ease; z-index:0; }
.cover-container:hover .cover-image { transform: scale(1.05); }

/* ===== INFO ===== */
.music-info { text-align:center; margin-bottom:15px; z-index:2; }
.music-title { font-size:1.6rem; font-weight:700; margin-bottom:6px; }
.music-artist { font-size:1rem; color: var(--text-secondary); }

/* ===== PLAYER ===== */
.spotify-player { width:100%; height:80px; margin-bottom:10px; border-radius:12px; overflow:hidden; z-index:2; }
.spotify-player iframe { width:100%; height:100%; border-radius:12px; }

/* ===== BOTÕES ===== */
.card-actions {
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center; z-index:3;
}
.btn {
    padding:8px 14px; border-radius:30px; font-weight:600; text-decoration:none; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:all 0.3s ease; position:relative;
    font-size:0.9rem;
}
.spotify-btn { background: var(--accent-green); color:#000; border:none; }
.spotify-btn:hover { background: var(--accent-green-hover); transform:translateY(-2px); box-shadow:0 6px 15px rgba(29,185,84,0.4); }
.save-btn { background: rgba(29,185,84,0.2); color:#fff; border:none; }
.save-btn:hover { background: var(--accent-green-hover); color:#000; }

/* ===== DOTS ===== */
.scroll-indicator {
    position: fixed; right:20px; top:50%;
    transform:translateY(-50%); display:flex; flex-direction:column; gap:12px; z-index:100;
}
.dot { width:10px; height:10px; border-radius:50%; background-color:var(--text-secondary); cursor:pointer; transition:all 0.3s ease; }
.dot.active { background-color:var(--accent-green); transform:scale(1.3); box-shadow:0 0 15px var(--accent-green); }

/* ===== REDES SOCIAIS ===== */
.social-sidebar { position:fixed; left:20px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:20px; z-index:100; }
.social-icon { font-size:24px; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; position:relative; }
.social-icon::before {
    content:'';
    position:absolute; width:40px; height:40px; border-radius:50%;
    background: rgba(29,185,84,0.3);
    z-index:-1; transition:all 0.3s ease;
}
.social-icon:hover::before { background: rgba(29,185,84,0.6); }
.social-icon:hover { color: var(--accent-green); transform:translateY(-3px) scale(1.2); }

/* ===== ANIMAÇÕES ===== */
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }

</style>
</head>
<body>
<header class="header">
    <div class="logo">
        <span class="logo-icon">🎧</span>
        <h1>BoomMusicX</h1>
    </div>
</header>

<main class="feed">
    <!-- Card 1 -->
    <section class="music-card" data-index="0">
        <div class="card-content">
            <div class="cover-container">
                <img src="https://i.scdn.co/image/ab67616d0000b273e8b066f70c206ae210de89b7" alt="Capa da música" class="cover-image">
            </div>
            <div class="music-info">
                <h2 class="music-title">Blinding Lights</h2>

            <div class="spotify-player">

            </div>

    <!-- Card 2 -->

            </div>
            <div class="music-info">
                <h2 class="music-title">Levitating</h2>
                <p class="music-artist">Dua Lipa ft. DaBaby</p>
            </div>
            <div class="spotify-player">
                <iframe src="https://open.spotify.com/embed/track/5nujrmhLynf4yMoMtj8AQF?utm_source=generator&theme=0" width="100%" height="80" frameborder="0" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" title="Spotify Player - Levitating"></iframe>
            </div>
            <div class="card-actions">
                <a href="https://open.spotify.com/track/5nujrmhLynf4yMoMtj8AQF" target="_blank" class="btn spotify-btn">
                    <i class="fab fa-spotify"></i> Ouvir no Spotify
                </a>
                <a href="https://open.spotify.com/track/5nujrmhLynf4yMoMtj8AQF?si=save" target="_blank" class="btn save-btn">
                    <i class="fas fa-plus-circle"></i> Salvar playlist
                </a>
            </div>
        </div>
    </section>

    <!-- Card 3 -->
    <section class="music-card" data-index="2">
        <div class="card-content">
            <div class="cover-container">
                <img src="https://i.scdn.co/image/ab67706f00000002fe6d305e7d2921b95d3b79d9" alt="Capa da playlist" class="cover-image">
            </div>
            <div class="music-info">
                <h2 class="music-title">Today's Top Hits</h2>
                <p class="music-artist">Spotify</p>
            </div>
            <div class="spotify-player">
                <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M?utm_source=generator&theme=0" width="100%" height="80" frameborder="0" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" title="Spotify Player - Today's Top Hits"></iframe>
            </div>
            <div class="card-actions">
                <a href="https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M" target="_blank" class="btn spotify-btn">
                    <i class="fab fa-spotify"></i> Ouvir no Spotify
                </a>
                <a href="https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M?si=save" target="_blank" class="btn save-btn">
                    <i class="fas fa-plus-circle"></i> Salvar playlist
                </a>
            </div>
        </div>
    </section>
</main>

<!-- Dots -->
<div class="scroll-indicator">
    <div class="dot active" data-index="0"></div>
    <div class="dot" data-index="1"></div>
    <div class="dot" data-index="2"></div>
</div>

<!-- Redes sociais -->
<div class="social-sidebar">
    <a href="https://instagram.com" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
    <a href="https://youtube.com" target="_blank" class="social-icon"><i class="fab fa-youtube"></i></a>

<script src="script.js"></script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registrado:', reg.scope))

</body>
</html>
